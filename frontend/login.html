<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Creator - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: #1a1a1a;
            padding: 40px;
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            width: 400px;
            max-width: 90%;
        }

        .login-title {
            font-size: 24px;
            font-weight: 500;
            text-align: center;
            margin-bottom: 8px;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .login-subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 13px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
            color: #fff;
            border-radius: 2px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #fff;
        }

        .login-button {
            width: 100%;
            padding: 12px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .login-button:hover {
            background: #e0e0e0;
        }

        .login-button:active {
            transform: scale(0.98);
        }

        .error-message {
            color: #fff;
            background: #333;
            padding: 10px;
            border-radius: 2px;
            text-align: center;
            margin-top: 15px;
            display: none;
            font-size: 13px;
        }

        .change-password-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #555;
            font-size: 12px;
            cursor: pointer;
            transition: color 0.2s;
            background: none;
            border: none;
            width: 100%;
            padding: 4px;
        }

        .change-password-link:hover {
            color: #aaa;
        }

        /* 修改密码弹窗 */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            width: 420px;
            max-width: 90vw;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            font-size: 16px;
            color: #fff;
            font-weight: 500;
        }

        .modal-close {
            background: none;
            border: none;
            color: #666;
            font-size: 24px;
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 2px;
        }

        .modal-close:hover {
            background: #2a2a2a;
            color: #fff;
        }

        .modal-body {
            padding: 30px;
        }

        .modal-form-group {
            margin-bottom: 18px;
        }

        .modal-label {
            display: block;
            margin-bottom: 8px;
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .modal-input {
            width: 100%;
            padding: 10px 12px;
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
            color: #fff;
            border-radius: 2px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .modal-input:focus {
            outline: none;
            border-color: #fff;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }

        .modal-actions button {
            flex: 1;
            padding: 10px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-primary {
            background: #fff;
            color: #000;
        }

        .btn-primary:hover {
            background: #e0e0e0;
        }

        .btn-secondary {
            background: transparent;
            color: #fff;
            border: 1px solid #3a3a3a !important;
        }

        .btn-secondary:hover {
            border-color: #fff !important;
        }

        .modal-error {
            margin-top: 10px;
            color: #ff6b6b;
            font-size: 12px;
            display: none;
        }

        .modal-success {
            margin-top: 10px;
            color: #6bff9a;
            font-size: 12px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1 class="login-title">Story Creator</h1>
        <p class="login-subtitle">使用用户名和密码登录</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="请输入您的用户名"
                    required
                >
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="请输入密码"
                    required
                >
            </div>

            <button type="submit" class="login-button">登录</button>

            <div id="errorMessage" class="error-message"></div>
        </form>

        <button class="change-password-link" onclick="openChangePwdModal()">修改密码</button>
    </div>

    <!-- 修改密码弹窗 -->
    <div class="modal" id="changePwdModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>修改密码</h3>
                <button class="modal-close" onclick="closeChangePwdModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="modal-form-group">
                    <label class="modal-label">用户名</label>
                    <input type="text" class="modal-input" id="cpUsername" placeholder="请输入用户名">
                </div>
                <div class="modal-form-group">
                    <label class="modal-label">原密码</label>
                    <input type="password" class="modal-input" id="cpOldPassword" placeholder="请输入原密码">
                </div>
                <div class="modal-form-group">
                    <label class="modal-label">新密码</label>
                    <input type="password" class="modal-input" id="cpNewPassword" placeholder="请输入新密码">
                </div>
                <div class="modal-form-group">
                    <label class="modal-label">确认新密码</label>
                    <input type="password" class="modal-input" id="cpConfirmPassword" placeholder="再次输入新密码">
                </div>
                <div id="cpError" class="modal-error"></div>
                <div id="cpSuccess" class="modal-success"></div>
                <div class="modal-actions">
                    <button class="btn-secondary" onclick="closeChangePwdModal()">取消</button>
                    <button class="btn-primary" onclick="submitChangePassword()">确认修改</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorMessage = document.getElementById('errorMessage');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            if (!username) {
                showError('请输入用户名');
                return;
            }
            if (!password) {
                showError('请输入密码');
                return;
            }

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    const userData = await response.json();
                    completeLogin(userData);
                } else {
                    const errorData = await response.json();
                    showError(errorData.detail || '登录失败');
                }
            } catch (error) {
                showError('登录失败，请稍后重试');
                console.error('Login error:', error);
            }
        });

        function completeLogin(userData) {
            localStorage.removeItem('story_creator_state_v1');
            localStorage.removeItem('story_creator_import_batches_v1');
            localStorage.setItem('authToken', userData.token);
            localStorage.setItem('username', userData.username);
            localStorage.setItem('userId', userData.id);
            window.location.href = '/app';
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            setTimeout(() => { errorMessage.style.display = 'none'; }, 3000);
        }

        // 检查是否已登录
        const savedToken = localStorage.getItem('authToken');
        if (savedToken) {
            fetch('/api/auth/verify', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${savedToken}` }
            }).then(response => {
                if (response.ok) window.location.href = '/app';
            });
        }

        // ===== 修改密码 =====
        function openChangePwdModal() {
            document.getElementById('cpUsername').value = usernameInput.value || '';
            document.getElementById('cpOldPassword').value = '';
            document.getElementById('cpNewPassword').value = '';
            document.getElementById('cpConfirmPassword').value = '';
            document.getElementById('cpError').style.display = 'none';
            document.getElementById('cpSuccess').style.display = 'none';
            document.getElementById('changePwdModal').classList.add('active');
        }

        function closeChangePwdModal() {
            document.getElementById('changePwdModal').classList.remove('active');
        }

        async function submitChangePassword() {
            const username = document.getElementById('cpUsername').value.trim();
            const oldPassword = document.getElementById('cpOldPassword').value;
            const newPassword = document.getElementById('cpNewPassword').value;
            const confirmPassword = document.getElementById('cpConfirmPassword').value;
            const errEl = document.getElementById('cpError');
            const sucEl = document.getElementById('cpSuccess');

            errEl.style.display = 'none';
            sucEl.style.display = 'none';

            if (!username || !oldPassword || !newPassword || !confirmPassword) {
                errEl.textContent = '请填写所有字段';
                errEl.style.display = 'block';
                return;
            }
            if (newPassword !== confirmPassword) {
                errEl.textContent = '两次输入的新密码不一致';
                errEl.style.display = 'block';
                return;
            }

            try {
                const response = await fetch('/api/auth/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, old_password: oldPassword, new_password: newPassword })
                });

                if (response.ok) {
                    sucEl.textContent = '密码修改成功，请重新登录';
                    sucEl.style.display = 'block';
                    setTimeout(() => closeChangePwdModal(), 2000);
                } else {
                    const data = await response.json();
                    errEl.textContent = data.detail || '修改失败';
                    errEl.style.display = 'block';
                }
            } catch (e) {
                errEl.textContent = '请求失败，请稍后重试';
                errEl.style.display = 'block';
            }
        }

        document.getElementById('changePwdModal').addEventListener('click', (e) => {
            if (e.target.id === 'changePwdModal') closeChangePwdModal();
        });
    </script>
</body>
</html>
