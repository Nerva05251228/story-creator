<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>剧本计费</title>
  <style>
    :root{--bg:#071019;--panel:#101b28;--bd:#24354b;--txt:#eef4fb;--muted:#8da0b8;--acc:#2f7cf6;--ok:#37c78f;--warn:#efb04f;--danger:#ef7373}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:radial-gradient(circle at top left,rgba(47,124,246,.16),transparent 28%),linear-gradient(180deg,#08121c 0%,#060d14 100%);color:var(--txt)}
    button,input,select{font:inherit}button{cursor:pointer}.shell{max-width:1660px;margin:0 auto;padding:24px 20px 36px}.topbar{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:18px}.topbar h1{margin:0;font-size:30px}.subtitle{margin-top:8px;color:var(--muted);font-size:14px;line-height:1.6;max-width:860px}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn{padding:10px 16px;border-radius:12px;border:1px solid var(--bd);background:var(--panel);color:var(--txt)}.btn.primary{background:var(--acc);border-color:rgba(47,124,246,.45)}.btn.active{background:rgba(47,124,246,.18);border-color:rgba(47,124,246,.5)}.status{min-height:20px;margin-bottom:16px;color:var(--muted);font-size:13px}.status.error{color:var(--danger)}.month-filter{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.month-filter input{padding:10px 12px;border:1px solid var(--bd);border-radius:12px;background:rgba(7,16,25,.7);color:var(--txt)}
    .layout{display:grid;grid-template-columns:320px 320px minmax(0,1fr);gap:18px;align-items:start}.panel{background:linear-gradient(180deg,var(--panel),#0c1520);border:1px solid var(--bd);border-radius:18px;overflow:hidden}.head{padding:18px 20px 0}.title{font-size:17px;font-weight:600}.meta{margin-top:6px;color:var(--muted);font-size:12px;line-height:1.5}.body{padding:18px 20px 20px}.list{display:grid;gap:12px}.item{padding:14px;border:1px solid var(--bd);border-radius:14px;background:rgba(6,13,20,.45);transition:border-color .15s ease,background .15s ease}.item:hover{border-color:rgba(47,124,246,.32)}.item.active{border-color:rgba(47,124,246,.55);background:rgba(19,39,63,.72)}.item-name{font-weight:600}.item-sub{margin-top:6px;color:var(--muted);font-size:12px;line-height:1.4}.stats,.summary,.cols{display:grid;gap:8px}.stats{margin-top:12px;grid-template-columns:repeat(2,minmax(0,1fr))}.summary{grid-template-columns:repeat(4,minmax(0,1fr));margin-bottom:18px}.cols{grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}.mini,.card{border:1px solid var(--bd);border-radius:12px;background:rgba(7,16,25,.6)}.mini{padding:9px 10px}.mini-label,.card-label{color:var(--muted);font-size:11px}.mini-value{margin-top:5px;font-size:13px;font-weight:600}.card{padding:14px}.card-value{margin-top:8px;font-size:22px;font-weight:650}.card-sub{margin-top:6px;color:var(--muted);font-size:12px;line-height:1.5}.table-wrap{overflow:auto;border:1px solid var(--bd);border-radius:14px;background:rgba(7,16,25,.52)}table{width:100%;border-collapse:collapse;min-width:720px}th,td{padding:11px 13px;border-bottom:1px solid rgba(36,53,75,.7);text-align:left;vertical-align:top;font-size:13px}thead th{position:sticky;top:0;background:#0c1520;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.04em}.mono{font-family:Consolas,monospace;color:#b9d9ff;word-break:break-all}.muted{color:var(--muted)}.empty{text-align:center;padding:32px 16px;color:var(--muted);line-height:1.6}.tag{display:inline-flex;padding:4px 9px;border-radius:999px;border:1px solid transparent;font-size:11px}.tag-charge,.tag-finalized{color:var(--ok);background:rgba(55,199,143,.1);border-color:rgba(55,199,143,.22)}.tag-pending{color:var(--warn);background:rgba(239,176,79,.1);border-color:rgba(239,176,79,.22)}.tag-refund,.tag-reversed{color:var(--danger);background:rgba(239,115,115,.1);border-color:rgba(239,115,115,.22)}.toolbar{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}.segmented{display:inline-flex;gap:8px;flex-wrap:wrap}.modal{position:fixed;inset:0;background:rgba(4,8,14,.72);display:none;align-items:center;justify-content:center;padding:20px;z-index:1000}.modal.active{display:flex}.modal-card{width:min(420px,100%);background:linear-gradient(180deg,#142233,#0d1724);border:1px solid var(--bd);border-radius:18px;padding:22px;box-shadow:0 18px 48px rgba(0,0,0,.35)}.auth-box{display:grid;gap:12px}.auth-box input{width:100%;padding:10px 12px;border:1px solid var(--bd);border-radius:12px;background:rgba(7,16,25,.7);color:var(--txt)}.auth-error{display:none;color:var(--danger);font-size:13px}.auth-tip{color:var(--muted);font-size:13px;line-height:1.6}
    @media (max-width:1380px){.layout,.summary,.cols{grid-template-columns:1fr}}@media (max-width:720px){.shell{padding:18px 12px 24px}.topbar{flex-direction:column}.summary,.stats{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div>
        <h1>剧本计费</h1>
        <div class="subtitle">管理员视图：默认查看全部用户账单，可按剧本或按用户分组下钻到剧集与单次请求。价格规则已移到单独页面维护。</div>
      </div>
      <div class="actions">
        <button class="btn" id="exportReimbursementButton" type="button" onclick="downloadReimbursementCsv()">导出报销 CSV</button>
        <button class="btn" onclick="returnToApp()">返回主页</button>
        <button class="btn" id="billingRulesButton" onclick="openBillingRules()">价格规则</button>
        <button class="btn primary" id="refreshButton" onclick="refreshAll()">刷新数据</button>
      </div>
    </div>
    <div class="toolbar" style="margin-bottom:14px">
      <div class="segmented" id="groupModeSwitch">
        <button class="btn active" id="groupModeScriptBtn" type="button" onclick="setGroupMode('script')">按剧本</button>
        <button class="btn" id="groupModeUserBtn" type="button" onclick="setGroupMode('user')">按用户</button>
      </div>
      <div class="muted" id="groupModeHint">按剧本模式：左列剧本，中列剧集，右列详情。</div>
    </div>
    <div class="status" id="statusLine">请输入管理员密码后加载计费数据。</div>
    <div class="toolbar" style="margin-bottom:14px">
      <div class="month-filter">
        <span class="muted">月份</span>
        <input id="monthFilterInput" type="month" onchange="setMonthFilter(this.value)">
        <button class="btn" id="clearMonthFilterButton" type="button" onclick="clearMonthFilter()">全部月份</button>
      </div>
    </div>
    <div class="layout">
      <section class="panel">
        <div class="head"><div class="title" id="primaryPanelTitle">剧本账单</div><div class="meta" id="primaryPanelMeta">先看每个剧本的总成本，再进入具体剧集。</div></div>
        <div class="body"><div class="list" id="primaryList"><div class="empty">等待管理员授权。</div></div></div>
      </section>
      <section class="panel">
        <div class="head"><div class="title" id="secondaryPanelTitle">剧集列表</div><div class="meta" id="secondaryPanelMeta">选中左侧项目后查看下一级列表。</div></div>
        <div class="body"><div class="list" id="scriptList"><div class="empty">等待管理员授权。</div></div></div>
      </section>
      <section class="panel">
        <div class="head"><div class="title" id="detailTitle">账单详情</div><div class="meta" id="detailMeta">选中左侧项目后查看汇总与明细。</div></div>
        <div class="body" id="detailBody"><div class="empty">等待管理员授权。</div></div>
      </section>
    </div>
  </div>

  <div class="modal" id="adminAuthModal">
    <div class="modal-card">
      <div class="title">管理员验证</div>
      <div class="auth-tip">进入 billing 管理视图前，请输入管理员密码。</div>
      <div class="auth-box" style="margin-top:14px">
        <input type="password" id="adminPasswordInput" placeholder="输入管理员密码">
        <div id="adminAuthError" class="auth-error">管理员密码错误</div>
      </div>
      <div class="toolbar" style="margin-top:18px">
        <button class="btn" type="button" onclick="returnToApp()">返回主页</button>
        <button class="btn primary" type="button" onclick="confirmAdminPassword()">进入</button>
      </div>
    </div>
  </div>

  <script>
    const ADMIN_PASSWORD='admin1024';
    const ADMIN_AUTH_STORAGE_KEY='ui_admin_auth_v1';
    const ADMIN_AUTH_PASSWORD_KEY='ui_admin_password_v1';
    const state={groupMode:'script',selectedMonth:'',users:[],scripts:[],selectedUserId:null,selectedScriptId:null,scriptDetail:null,selectedEpisodeId:null,episodeDetail:null};
    let adminAuthed=false;

    function persistAdminAuth(password){localStorage.setItem(ADMIN_AUTH_STORAGE_KEY,'1');localStorage.setItem(ADMIN_AUTH_PASSWORD_KEY,password)}
    function clearAdminAuth(){adminAuthed=false;localStorage.removeItem(ADMIN_AUTH_STORAGE_KEY);localStorage.removeItem(ADMIN_AUTH_PASSWORD_KEY)}
    function restoreAdminAuth(){const unlocked=localStorage.getItem(ADMIN_AUTH_STORAGE_KEY)==='1';const password=localStorage.getItem(ADMIN_AUTH_PASSWORD_KEY)||'';if(unlocked&&password){adminAuthed=true;return true}clearAdminAuth();return false}
    function showAdminAuthModal(){document.getElementById('adminAuthModal').classList.add('active');const input=document.getElementById('adminPasswordInput');document.getElementById('adminAuthError').style.display='none';input.value='';setTimeout(()=>input.focus(),0)}
    function hideAdminAuthModal(){document.getElementById('adminAuthModal').classList.remove('active')}
    async function confirmAdminPassword(){const input=document.getElementById('adminPasswordInput');const value=(input.value||'').trim();if(!value){document.getElementById('adminAuthError').style.display='block';input.focus();return}adminAuthed=true;persistAdminAuth(value);hideAdminAuthModal();try{await initialize()}catch(error){console.error('Failed to initialize billing page:',error);setStatus(error.message||'初始化计费页面失败。','error')}}
    function ensureAdminAuth(){if(adminAuthed||restoreAdminAuth())return true;showAdminAuthModal();return false}

    function html(value){const div=document.createElement('div');div.textContent=value==null?'':String(value);return div.innerHTML}
    function headers(extra={}){const token=localStorage.getItem('authToken');const adminPassword=localStorage.getItem(ADMIN_AUTH_PASSWORD_KEY);return{...extra,...(token?{Authorization:`Bearer ${token}`}:{}) ,...(adminPassword?{'X-Admin-Password':adminPassword}:{})}}
    function buildBillingQuery(params={}){const query=new URLSearchParams();Object.entries(params).forEach(([key,value])=>{if(value!=null&&value!=='')query.set(key,String(value))});if(state.selectedMonth)query.set('month',state.selectedMonth);const text=query.toString();return text?`?${text}`:''}
    async function apiFetch(url,options={}){if(!ensureAdminAuth())throw new Error('管理员未授权');const response=await fetch(url,{...options,headers:headers(options.headers||{})});const payload=await response.json().catch(()=>({}));const detail=String(payload.detail||'').trim();if(response.status===401)throw new Error(detail||'请先登录后再访问计费页');if(response.status===403&&/not authenticated/i.test(detail)){throw new Error('请先登录后再访问计费页')}if(response.status===403){clearAdminAuth();showAdminAuthModal();document.getElementById('adminAuthError').style.display='block';throw new Error(detail||'管理员密码错误')}if(!response.ok)throw new Error(detail||`${url} 请求失败 (${response.status})`);return payload}
    function setStatus(message,type=''){const node=document.getElementById('statusLine');node.textContent=message;node.className=type?`status ${type}`:'status'}
    function returnToApp(){window.location.href=`${window.location.origin}/`}
    function openBillingRules(){window.location.href=`${window.location.origin}/billing-rules`}
    function money(value){const n=Number(value||0);return Number.isFinite(n)?`¥${n.toFixed(5)}`:`¥${value||'0.00000'}`}
    function time(value){if(!value)return'-';const normalized=/Z|[+-]\d{2}:?\d{2}$/.test(value)?value:`${value}Z`;const date=new Date(normalized);return Number.isNaN(date.getTime())?value:date.toLocaleString('zh-CN')}
    function csvCell(value){const text=String(value==null?'':value);return /[",\r\n]/.test(text)?`"${text.replace(/"/g,'""')}"`:text}
    function buildReimbursementCsv(payload){const groupBy=payload&&payload.group_by==='user'?'user':'script';const title=`表1：${payload&&payload.title?String(payload.title):groupBy==='user'?'按用户月度报销汇总':'按剧本月度报销汇总'}`;const dataRows=Array.isArray(payload&&payload.rows)?payload.rows:[];const csvRows=[[title],groupBy==='user'?['月份','用户','报销金额（元）']:['月份','剧本','用户','报销金额（元）']];dataRows.forEach((row)=>{if(groupBy==='user')csvRows.push([row.month||'',row.username||'',row.amount_rmb||'0.00000']);else csvRows.push([row.month||'',row.script_name||'',row.username||'',row.amount_rmb||'0.00000'])});return `\uFEFF${csvRows.map((row)=>row.map(csvCell).join(',')).join('\r\n')}`}
    function buildReimbursementFilename(groupBy){const current=new Date();const yyyy=String(current.getFullYear());const mm=String(current.getMonth()+1).padStart(2,'0');const dd=String(current.getDate()).padStart(2,'0');return `billing-reimbursement-${groupBy==='user'?'user':'script'}-${yyyy}-${mm}-${dd}.csv`}
    function tag(label,type){return `<span class="tag tag-${html(type)}">${html(label)}</span>`}
    function rows(items,empty,mapper){return Array.isArray(items)&&items.length?items.map(mapper).join(''):`<tr><td colspan="${empty}" class="empty">暂无数据</td></tr>`}
    function summaryCards(summary={},categories=[],extra=[]){const extraCards=extra.map((item)=>`<div class="card"><div class="card-label">${html(item.label)}</div><div class="card-value">${html(item.value)}</div><div class="card-sub">${html(item.sub||'')}</div></div>`).join('');const catCards=categories.map((item)=>`<div class="card"><div class="card-label">${html(item.category)}</div><div class="card-value">${html(money(item.net_amount_rmb))}</div><div class="card-sub">请求 ${html(String(item.charge_count||0))} / 退款 ${html(String(item.refund_count||0))}</div></div>`).join('');return `<div class="summary"><div class="card"><div class="card-label">净额</div><div class="card-value">${html(money(summary.net_amount_rmb))}</div><div class="card-sub">总流水 ${html(String(summary.entry_count||0))}</div></div><div class="card"><div class="card-label">请求次数</div><div class="card-value">${html(String(summary.request_count||0))}</div><div class="card-sub">包含全部重试</div></div><div class="card"><div class="card-label">退款次数</div><div class="card-value">${html(String(summary.refund_count||0))}</div><div class="card-sub">异步失败冲回</div></div><div class="card"><div class="card-label">待结算</div><div class="card-value">${html(money(summary.pending_amount_rmb))}</div><div class="card-sub">提交成功待确认</div></div>${extraCards}${catCards}</div>`}
    function stageRows(items){return rows(items,6,(row)=>`<tr><td class="mono">${html(row.stage||'-')}</td><td>${html(row.category||'-')}</td><td>${html(String(row.charge_count||0))}</td><td>${html(String(row.refund_count||0))}</td><td>${html(money(row.pending_amount_rmb))}</td><td>${html(money(row.net_amount_rmb))}</td></tr>`)}
    function operationRows(items){return rows(items,6,(row)=>`<tr><td>${html(time(row.first_created_at))}</td><td class="mono">${html(row.operation_key||'-')}</td><td>${html(row.stage||'-')}</td><td>${html(String(row.max_attempt_index||1))}</td><td>${html(String(row.charge_count||0))}</td><td>${html(money(row.net_amount_rmb))}</td></tr>`)}
    function modelRows(items){return rows(items,5,(row)=>`<tr><td>${html(row.category||'-')}</td><td>${html(row.provider||'-')}</td><td class="mono">${html(row.model_name||'-')}</td><td>${html(String(row.charge_count||0))}</td><td>${html(money(row.net_amount_rmb))}</td></tr>`)}
    function scriptEpisodeRows(items){return rows(items,8,(row)=>`<tr><td>${html(row.episode_name||'-')}</td><td>${html(row.username||`用户 #${row.user_id}`)}</td><td>${html(time(row.created_at))}</td><td>${html(String(row.request_count||0))}</td><td>${html(money(row.text_amount_rmb))}</td><td>${html(money(row.image_amount_rmb))}</td><td>${html(money(row.video_amount_rmb))}</td><td>${html(money(row.net_amount_rmb))}</td></tr>`)}
    function entryRows(items){return rows(items,12,(row)=>{const refs=[];if(row.user_id!=null)refs.push(`user:${row.user_id}`);if(row.script_id!=null)refs.push(`script:${row.script_id}`);if(row.episode_id!=null)refs.push(`episode:${row.episode_id}`);if(row.shot_id!=null)refs.push(`shot:${row.shot_id}`);if(row.storyboard2_shot_id!=null)refs.push(`sb2:${row.storyboard2_shot_id}`);if(row.sub_shot_id!=null)refs.push(`sub:${row.sub_shot_id}`);if(row.card_id!=null)refs.push(`card:${row.card_id}`);if(row.reason)refs.push(`reason:${row.reason}`);if(row.resolution)refs.push(`resolution:${row.resolution}`);return `<tr><td>${html(time(row.created_at))}</td><td>${html(row.category||'-')}</td><td class="mono">${html(row.stage||'-')}</td><td><div>${html(row.provider||'-')}</div><div class="muted mono">${html(row.model_name||'-')}</div></td><td>${html(row.billing_mode||'-')}</td><td>${html(row.quantity||'-')}</td><td>${html(money(row.unit_price_rmb))}</td><td>${html(money(row.amount_rmb))}</td><td>${tag(row.entry_type||'-',row.entry_type||'charge')}</td><td>${tag(row.status||'-',row.status||'pending')}</td><td>${html(String(row.attempt_index||1))}</td><td class="mono">${html(refs.join(' | ')||row.billing_key||'-')}</td></tr>`})}

    function currentPrimaryItems(){return state.groupMode==='user'?state.users:state.scripts}
    function currentSelectedPrimaryId(){return state.groupMode==='user'?state.selectedUserId:state.selectedScriptId}
    function primaryItemSubtitle(item){if(state.groupMode==='user')return `${time(item.created_at)} · ${item.script_count||0} 个剧本${item.user_deleted?' · 已删除':''}`;return `${time(item.created_at)} · ${item.username||`用户 #${item.user_id}`}${item.script_deleted?' · 已删除':''}`}
    function primaryStats(item){if(state.groupMode==='user'){return[{label:'净额',value:money(item.net_amount_rmb)},{label:'剧本数',value:String(item.script_count||0)},{label:'请求数',value:String(item.request_count||0)},{label:'视频费用',value:money(item.video_amount_rmb)}]}return[{label:'净额',value:money(item.net_amount_rmb)},{label:'剧集数',value:String(item.episode_count||0)},{label:'请求数',value:String(item.request_count||0)},{label:'所属用户',value:item.username||`用户 #${item.user_id}`}]}
    function secondaryItems(){if(state.groupMode==='user'){if(!state.selectedUserId)return[];return state.scripts.filter((item)=>Number(item.user_id)===Number(state.selectedUserId))}return Array.isArray(state.scriptDetail?.episodes)?state.scriptDetail.episodes:[]}

    function updateGroupModeUI(){const scriptBtn=document.getElementById('groupModeScriptBtn');const userBtn=document.getElementById('groupModeUserBtn');scriptBtn.classList.toggle('active',state.groupMode==='script');userBtn.classList.toggle('active',state.groupMode==='user');document.getElementById('groupModeHint').textContent=state.groupMode==='user'?'按用户模式：左列用户，中列该用户的剧本，右侧展示剧本或剧集详情。':'按剧本模式：左列剧本，中列剧集，右列详情。';document.getElementById('primaryPanelTitle').textContent=state.groupMode==='user'?'账单用户':'剧本账单';document.getElementById('primaryPanelMeta').textContent=state.groupMode==='user'?'先按用户看总账，再进入该用户名下剧本。':'先看每个剧本的总成本，再进入具体剧集。';document.getElementById('secondaryPanelTitle').textContent=state.groupMode==='user'?'用户剧本':'剧集列表'}

    function renderPrimaryList(){const node=document.getElementById('primaryList');const items=currentPrimaryItems();if(!items.length){node.innerHTML=`<div class="empty">${state.groupMode==='user'?'暂无有账单的用户。':'暂无账单剧本。'}</div>`;return}node.innerHTML=items.map((item)=>{const itemId=state.groupMode==='user'?item.user_id:item.script_id;const active=Number(itemId)===Number(currentSelectedPrimaryId())?'active':'';const title=state.groupMode==='user'?(item.username||`用户 #${item.user_id}`):(item.script_name||`剧本 #${item.script_id}`);const stats=primaryStats(item).map((stat)=>`<div class="mini"><div class="mini-label">${html(stat.label)}</div><div class="mini-value">${html(stat.value)}</div></div>`).join('');return `<div class="item ${active}" onclick="selectPrimary(${itemId})"><div class="item-name">${html(title)}</div><div class="item-sub">${html(primaryItemSubtitle(item))}</div><div class="stats">${stats}</div></div>`}).join('')}

    function renderSecondaryList(){const node=document.getElementById('scriptList');const meta=document.getElementById('secondaryPanelMeta');if(state.groupMode==='user'){if(!state.selectedUserId){meta.textContent='选中左侧用户后查看该用户名下剧本。';node.innerHTML='<div class="empty">请选择用户。</div>';return}const user=state.users.find((item)=>Number(item.user_id)===Number(state.selectedUserId));const items=secondaryItems();meta.textContent=`${user?.username||`用户 #${state.selectedUserId}`} 名下共 ${items.length} 个账单剧本`;if(!items.length){node.innerHTML='<div class="empty">该用户暂无账单剧本。</div>';return}node.innerHTML=items.map((script)=>{const active=Number(script.script_id)===Number(state.selectedScriptId)?'active':'';return `<div class="item ${active}" onclick="selectScript(${script.script_id})"><div class="item-name">${html(script.script_name||`剧本 #${script.script_id}`)}</div><div class="item-sub">${html(time(script.created_at))}${script.script_deleted?' · 已删除':''}</div><div class="stats"><div class="mini"><div class="mini-label">净额</div><div class="mini-value">${html(money(script.net_amount_rmb))}</div></div><div class="mini"><div class="mini-label">剧集数</div><div class="mini-value">${html(String(script.episode_count||0))}</div></div><div class="mini"><div class="mini-label">请求数</div><div class="mini-value">${html(String(script.request_count||0))}</div></div><div class="mini"><div class="mini-label">文本费用</div><div class="mini-value">${html(money(script.text_amount_rmb))}</div></div></div></div>`}).join('');return}if(!state.scriptDetail){meta.textContent='选中左侧剧本后查看该剧本下的剧集。';node.innerHTML='<div class="empty">请选择剧本。</div>';return}meta.textContent=`${state.scriptDetail.script_name||'-'} 下面共 ${state.scriptDetail.episode_count||0} 集`;const episodes=secondaryItems();if(!episodes.length){node.innerHTML='<div class="empty">当前剧本还没有账单剧集。</div>';return}node.innerHTML=episodes.map((episode)=>{const active=Number(episode.episode_id)===Number(state.selectedEpisodeId)?'active':'';return `<div class="item ${active}" onclick="selectEpisode(${episode.episode_id})"><div class="item-name">${html(episode.episode_name||`剧集 #${episode.episode_id}`)}</div><div class="item-sub">${html(time(episode.created_at))}${episode.episode_deleted?' · 已删除':''}</div><div class="stats"><div class="mini"><div class="mini-label">净额</div><div class="mini-value">${html(money(episode.net_amount_rmb))}</div></div><div class="mini"><div class="mini-label">请求数</div><div class="mini-value">${html(String(episode.request_count||0))}</div></div><div class="mini"><div class="mini-label">文本费用</div><div class="mini-value">${html(money(episode.text_amount_rmb))}</div></div><div class="mini"><div class="mini-label">视频费用</div><div class="mini-value">${html(money(episode.video_amount_rmb))}</div></div></div></div>`}).join('')}

    function detailBlock(detail,isEpisode){const prefix=detail.username?`${detail.username} · `:'';const toolbar=isEpisode?`<div class="toolbar" style="margin-bottom:12px"><div class="muted">${html(prefix)}当前为剧集级视图，可直接看阶段、重试和单条请求。</div><button class="btn" type="button" onclick="clearEpisodeSelection()">回到剧本汇总</button></div>`:`<div class="toolbar" style="margin-bottom:12px"><div class="muted">${html(prefix)}当前为剧本级视图。点击中间列表可切到单集明细。</div></div>`;const episodeTable=isEpisode?'':`<div><div class="title" style="margin-bottom:10px">按剧集汇总</div><div class="table-wrap"><table><thead><tr><th>剧集</th><th>用户</th><th>创建时间</th><th>请求</th><th>文本</th><th>图片</th><th>视频</th><th>净额</th></tr></thead><tbody>${scriptEpisodeRows(detail.episodes)}</tbody></table></div></div>`;return `${toolbar}${summaryCards(detail.summary,detail.category_summary,isEpisode?[]:[{label:'剧集数',value:String(detail.episode_count||0),sub:'当前剧本下进入计费视图的剧集'}])}<div class="cols">${episodeTable}<div><div class="title" style="margin-bottom:10px">阶段汇总</div><div class="table-wrap"><table><thead><tr><th>Stage</th><th>Category</th><th>请求</th><th>退款</th><th>待结算</th><th>净额</th></tr></thead><tbody>${stageRows(detail.stage_summary)}</tbody></table></div></div></div><div class="cols" style="margin-top:18px"><div><div class="title" style="margin-bottom:10px">模型汇总</div><div class="table-wrap"><table><thead><tr><th>Category</th><th>Provider</th><th>Model</th><th>请求</th><th>净额</th></tr></thead><tbody>${modelRows(detail.model_summary)}</tbody></table></div></div><div><div class="title" style="margin-bottom:10px">操作汇总</div><div class="table-wrap"><table><thead><tr><th>时间</th><th>Operation</th><th>Stage</th><th>最大重试</th><th>收费次数</th><th>净额</th></tr></thead><tbody>${operationRows(detail.operation_summary)}</tbody></table></div></div></div><div style="margin-top:18px"><div class="title" style="margin-bottom:10px">请求明细</div><div class="table-wrap"><table><thead><tr><th>时间</th><th>类别</th><th>Stage</th><th>Provider / Model</th><th>计费方式</th><th>数量</th><th>单价</th><th>金额</th><th>类型</th><th>状态</th><th>重试</th><th>对象 / 原因</th></tr></thead><tbody>${entryRows(detail.entries)}</tbody></table></div></div>`}

    function renderDetail(){const title=document.getElementById('detailTitle');const meta=document.getElementById('detailMeta');const body=document.getElementById('detailBody');if(state.episodeDetail){const detail=state.episodeDetail;title.textContent=detail.episode_name||`剧集 #${detail.episode_id}`;meta.textContent=`${detail.username||'-'} · ${detail.script_name||'-'} · 剧集级明细`;body.innerHTML=detailBlock(detail,true);return}if(state.scriptDetail){const detail=state.scriptDetail;title.textContent=detail.script_name||`剧本 #${detail.script_id}`;meta.textContent=`${detail.username||'-'} · 剧本级汇总 · 共 ${detail.episode_count||0} 集`;body.innerHTML=detailBlock(detail,false);return}title.textContent='账单详情';meta.textContent=state.groupMode==='user'?'选中用户后再选剧本，查看账单汇总与明细。':'选中剧本后先看剧本汇总，再点剧集看明细。';body.innerHTML=`<div class="empty">${state.groupMode==='user'?'请选择用户或剧本。':'请选择剧本。'}</div>`}

    async function loadUsers(){const payload=await apiFetch('/api/billing/users');state.users=Array.isArray(payload.users)?payload.users:[];if(state.users.length&&!state.users.some((item)=>Number(item.user_id)===Number(state.selectedUserId)))state.selectedUserId=Number(state.users[0].user_id);if(!state.users.length)state.selectedUserId=null}
    async function loadScripts(){const query=state.groupMode==='user'&&state.selectedUserId?`?group_by=user&user_id=${encodeURIComponent(state.selectedUserId)}`:`?group_by=${encodeURIComponent(state.groupMode)}`;const payload=await apiFetch(`/api/billing/scripts${query}`);state.scripts=Array.isArray(payload.scripts)?payload.scripts:[];if(state.scripts.length&&!state.scripts.some((item)=>Number(item.script_id)===Number(state.selectedScriptId)))state.selectedScriptId=Number(state.scripts[0].script_id);if(!state.scripts.length){state.selectedScriptId=null;state.scriptDetail=null;state.selectedEpisodeId=null;state.episodeDetail=null}}
    async function loadScriptDetail(scriptId){if(!scriptId){state.scriptDetail=null;state.selectedEpisodeId=null;state.episodeDetail=null;renderSecondaryList();renderDetail();return}state.scriptDetail=await apiFetch(`/api/billing/scripts/${scriptId}`);if(state.selectedEpisodeId){const exists=(state.scriptDetail.episodes||[]).some((item)=>Number(item.episode_id)===Number(state.selectedEpisodeId));if(!exists){state.selectedEpisodeId=null;state.episodeDetail=null}}renderSecondaryList();renderDetail()}
    async function loadEpisodeDetail(episodeId){if(!episodeId){state.selectedEpisodeId=null;state.episodeDetail=null;renderSecondaryList();renderDetail();return}state.episodeDetail=await apiFetch(`/api/billing/episodes/${episodeId}`);renderSecondaryList();renderDetail()}

    async function selectPrimary(primaryId){if(state.groupMode==='user'){state.selectedUserId=Number(primaryId);state.selectedScriptId=null;state.scriptDetail=null;state.selectedEpisodeId=null;state.episodeDetail=null;renderPrimaryList();renderSecondaryList();renderDetail();setStatus(`正在加载用户 #${primaryId} 的账单剧本...`);try{await loadScripts();renderPrimaryList();renderSecondaryList();renderDetail();setStatus(`已载入用户 ${state.users.find((item)=>Number(item.user_id)===Number(primaryId))?.username||primaryId} 的账单剧本。`)}catch(error){console.error('Failed to load user billing scripts:',error);setStatus(error.message||'加载用户账单失败。','error')}return}await selectScript(primaryId)}
    async function selectScript(scriptId){state.selectedScriptId=Number(scriptId);state.selectedEpisodeId=null;state.episodeDetail=null;renderPrimaryList();renderSecondaryList();setStatus(`正在加载剧本 #${scriptId} 的账单汇总...`);try{await loadScriptDetail(state.selectedScriptId);setStatus(`已载入剧本 ${state.scriptDetail.script_name||state.selectedScriptId} 的账单汇总。`)}catch(error){console.error('Failed to load billing script detail:',error);setStatus(error.message||'加载剧本账单失败。','error')}}
    async function selectEpisode(episodeId){state.selectedEpisodeId=Number(episodeId);renderSecondaryList();setStatus(`正在加载剧集 #${episodeId} 的账单明细...`);try{await loadEpisodeDetail(state.selectedEpisodeId);setStatus(`已载入剧集 ${state.episodeDetail.episode_name||state.selectedEpisodeId} 的账单明细。`)}catch(error){console.error('Failed to load billing episode detail:',error);setStatus(error.message||'加载剧集账单失败。','error')}}
    function clearEpisodeSelection(){state.selectedEpisodeId=null;state.episodeDetail=null;renderSecondaryList();renderDetail();if(state.scriptDetail)setStatus(`已返回剧本 ${state.scriptDetail.script_name||state.scriptDetail.script_id} 的汇总视图。`)}

    async function setGroupMode(mode){if(mode!==state.groupMode){state.groupMode=mode;state.selectedEpisodeId=null;state.episodeDetail=null;state.scriptDetail=null;updateGroupModeUI();renderPrimaryList();renderSecondaryList();renderDetail()}await refreshBillingView()}
    async function downloadReimbursementCsv(){if(!ensureAdminAuth())return;const button=document.getElementById('exportReimbursementButton');button.disabled=true;try{setStatus('正在生成报销 CSV...');const payload=await apiFetch(`/api/billing/reimbursement-export?group_by=${encodeURIComponent(state.groupMode)}`);const csv=buildReimbursementCsv(payload);const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});const downloadUrl=URL.createObjectURL(blob);const link=document.createElement('a');link.href=downloadUrl;link.download=buildReimbursementFilename(payload&&payload.group_by);document.body.appendChild(link);link.click();link.remove();URL.revokeObjectURL(downloadUrl);setStatus('报销 CSV 已开始下载。')}catch(error){console.error('Failed to export reimbursement csv:',error);setStatus(error.message||'导出报销 CSV 失败。','error')}finally{button.disabled=false}}
    async function refreshBillingView(){if(!ensureAdminAuth())return;const button=document.getElementById('refreshButton');button.disabled=true;try{setStatus('正在刷新计费数据...');await loadUsers();await loadScripts();if(state.selectedScriptId){await loadScriptDetail(state.selectedScriptId)}else{state.scriptDetail=null;state.selectedEpisodeId=null;state.episodeDetail=null}renderPrimaryList();renderSecondaryList();renderDetail();if(state.episodeDetail)setStatus(`刷新完成。当前查看剧集：${state.episodeDetail.episode_name||state.episodeDetail.episode_id}`);else if(state.scriptDetail)setStatus(`刷新完成。当前查看剧本：${state.scriptDetail.script_name||state.scriptDetail.script_id}`);else setStatus('刷新完成。')}catch(error){console.error('Failed to refresh billing data:',error);setStatus(error.message||'刷新计费数据失败。','error')}finally{button.disabled=false}}
    async function refreshAll(){await refreshBillingView()}
    async function initialize(){if(!ensureAdminAuth())return;hideAdminAuthModal();updateGroupModeUI();await refreshBillingView()}

    document.addEventListener('DOMContentLoaded',()=>{const adminPasswordInput=document.getElementById('adminPasswordInput');if(adminPasswordInput){adminPasswordInput.addEventListener('keydown',(e)=>{if(e.key==='Enter')confirmAdminPassword()})}if(restoreAdminAuth()){hideAdminAuthModal();initialize().catch((error)=>{console.error('Failed to initialize billing page:',error);setStatus(error.message||'初始化计费页面失败。','error')});return}showAdminAuthModal()})
    function updateMonthFilterUI(){const input=document.getElementById('monthFilterInput');const clearButton=document.getElementById('clearMonthFilterButton');if(input&&input.value!==state.selectedMonth)input.value=state.selectedMonth||'';if(clearButton)clearButton.disabled=!state.selectedMonth}
    async function setMonthFilter(month){const normalized=String(month||'').trim();if(normalized===state.selectedMonth)return;state.selectedMonth=normalized;updateMonthFilterUI();await refreshBillingView()}
    async function clearMonthFilter(){if(!state.selectedMonth)return;state.selectedMonth='';updateMonthFilterUI();await refreshBillingView()}
    function buildReimbursementCsv(payload){const groupBy=payload&&payload.group_by==='user'?'user':'script';const monthLabel=payload&&payload.month?`（${payload.month}）`:'';const title=`表1：${payload&&payload.title?String(payload.title):groupBy==='user'?'按用户月度报销汇总':'按剧本月度报销汇总'}${monthLabel}`;const dataRows=Array.isArray(payload&&payload.rows)?payload.rows:[];const csvRows=[[title],groupBy==='user'?['月份','用户','报销金额（元）']:['月份','剧本','用户','报销金额（元）']];dataRows.forEach((row)=>{if(groupBy==='user')csvRows.push([row.month||'',row.username||'',row.amount_rmb||'0.00000']);else csvRows.push([row.month||'',row.script_name||'',row.username||'',row.amount_rmb||'0.00000'])});return `\uFEFF${csvRows.map((row)=>row.map(csvCell).join(',')).join('\r\n')}`}
    function buildReimbursementFilename(groupBy,month){return `billing-reimbursement-${groupBy==='user'?'user':'script'}-${month||'all'}.csv`}
    async function loadUsers(){const payload=await apiFetch(`/api/billing/users${buildBillingQuery()}`);state.users=Array.isArray(payload.users)?payload.users:[];if(state.users.length&&!state.users.some((item)=>Number(item.user_id)===Number(state.selectedUserId)))state.selectedUserId=Number(state.users[0].user_id);if(!state.users.length)state.selectedUserId=null}
    async function loadScripts(){const payload=await apiFetch(`/api/billing/scripts${state.groupMode==='user'&&state.selectedUserId?buildBillingQuery({group_by:'user',user_id:state.selectedUserId}):buildBillingQuery({group_by:state.groupMode})}`);state.scripts=Array.isArray(payload.scripts)?payload.scripts:[];if(state.scripts.length&&!state.scripts.some((item)=>Number(item.script_id)===Number(state.selectedScriptId)))state.selectedScriptId=Number(state.scripts[0].script_id);if(!state.scripts.length){state.selectedScriptId=null;state.scriptDetail=null;state.selectedEpisodeId=null;state.episodeDetail=null}}
    async function loadScriptDetail(scriptId){if(!scriptId){state.scriptDetail=null;state.selectedEpisodeId=null;state.episodeDetail=null;renderSecondaryList();renderDetail();return}state.scriptDetail=await apiFetch(`/api/billing/scripts/${scriptId}${buildBillingQuery()}`);if(state.selectedEpisodeId){const exists=(state.scriptDetail.episodes||[]).some((item)=>Number(item.episode_id)===Number(state.selectedEpisodeId));if(!exists){state.selectedEpisodeId=null;state.episodeDetail=null}}renderSecondaryList();renderDetail()}
    async function loadEpisodeDetail(episodeId){if(!episodeId){state.selectedEpisodeId=null;state.episodeDetail=null;renderSecondaryList();renderDetail();return}state.episodeDetail=await apiFetch(`/api/billing/episodes/${episodeId}${buildBillingQuery()}`);renderSecondaryList();renderDetail()}
    async function downloadReimbursementCsv(){if(!ensureAdminAuth())return;const button=document.getElementById('exportReimbursementButton');button.disabled=true;try{setStatus('正在生成报销 CSV...');const payload=await apiFetch(`/api/billing/reimbursement-export${buildBillingQuery({group_by:state.groupMode})}`);const csv=buildReimbursementCsv(payload);const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});const downloadUrl=URL.createObjectURL(blob);const link=document.createElement('a');link.href=downloadUrl;link.download=buildReimbursementFilename(payload&&payload.group_by,payload&&payload.month||state.selectedMonth);document.body.appendChild(link);link.click();link.remove();URL.revokeObjectURL(downloadUrl);setStatus('报销 CSV 已开始下载。')}catch(error){console.error('Failed to export reimbursement csv:',error);setStatus(error.message||'导出报销 CSV 失败。','error')}finally{button.disabled=false}}
    async function initialize(){if(!ensureAdminAuth())return;hideAdminAuthModal();updateGroupModeUI();updateMonthFilterUI();await refreshBillingView()}
  </script>
</body>
</html>
